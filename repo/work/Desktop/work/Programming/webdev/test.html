<body>
    <h1>Biriyani</h1>
    <p>It is Bangladeshi dish made with rice , meat and spices</p>
    <h2>Ingredients</h2>
    <ul>
        <li>Rice</li>
        <li>Spice</li>
        <li>Meat</li>
        <li>Oil</li>
    </ul>
    <h2>Instructions</h2>
    <ol>
        <li>Clean and steam rice in water</li>
        <li>Fry onions with oil and steam rice</li>
        <li>Pour the rice in the oil and mix with spice</li>
        <li>Throw in the meat</li>
    </ol>
